[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "npm run dev"
  targetPort = 3000  
  publish = "public"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongodb", "pino", "pino-pretty"]

[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200



